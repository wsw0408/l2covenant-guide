name: B站天堂2盟约攻略视频自动巡检

on:
  schedule:
    - cron: '0 10 */3 * *'
  workflow_dispatch:
    inputs:
      keyword:
        description: '搜索关键词（可选）'
        required: false
        default: '天堂2盟约 攻略'

jobs:
  check-bilibili:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Search Bilibili videos and update site
        id: search
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import urllib.parse
          import json
          import re
          import os
          import sys
          import time

          KEYWORDS = ["天堂2盟约 攻略", "天堂2盟约 搬砖", "Lineage2 盟约"]
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36",
              "Referer": "https://search.bilibili.com/",
          }

          # 读取现有视频BV号
          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          known_bvids = set(re.findall(r"bvid:'(BV\w+)'", html))
          print(f"当前网站已有 {len(known_bvids)} 个视频: {known_bvids}")

          def search_bilibili(keyword):
              url = f"https://api.bilibili.com/x/web-interface/search/type?keyword={urllib.parse.quote(keyword)}&search_type=video&order=pubdate&page=1"
              req = urllib.request.Request(url, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
                      if data.get("data", {}).get("result", []):
                          return data["data"]["result"]
              except Exception as e:
                  print(f"搜索失败 {keyword}: {e}", file=sys.stderr)
              return []

          all_results = []
          seen_bvids = set()
          for kw in KEYWORDS:
              results = search_bilibili(kw)
              for item in results:
                  bvid = item.get("bvid", "")
                  if bvid and bvid not in seen_bvids:
                      seen_bvids.add(bvid)
                      all_results.append(item)

          # 过滤：排除已知视频，且发布时间不超过7天
          new_videos = []
          for item in all_results:
              bvid = item.get("bvid", "")
              if bvid in known_bvids:
                  continue
              pubdate = item.get("pubdate", 0)
              if pubdate and (time.time() - pubdate) <= 7 * 24 * 3600:
                  new_videos.append(item)

          # 按发布时间排序（最新的在前）
          new_videos.sort(key=lambda x: x.get("pubdate", 0), reverse=True)

          if not new_videos:
              print("NO_NEW_VIDEOS")
              with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
                  f.write("has_new=false\n")
              sys.exit(0)

          print(f"发现 {len(new_videos)} 个新视频")

          # 生成新的视频数据条目（插入到数组最前面）
          new_entries = []
          for v in new_videos:
              bvid = v.get("bvid", "")
              title = v.get("title", "").replace("<em class=\"keyword\">", "").replace("</em>", "").replace("'", "\\'")
              author = v.get("author", "").replace("'", "\\'")
              views_str = v.get("play", "0")
              # 尝试转换播放量为可读格式
              try:
                  views_num = int(views_str)
                  if views_num >= 10000:
                      views = f"{views_num // 10000}万播放"
                  else:
                      views = f"{views_num}播放"
              except:
                  views = views_str + "播放"

              # 判断标签类型
              tag = "攻略"
              lower_title = title.lower()
              if "搬砖" in lower_title:
                  tag = "搬砖攻略"
              elif "职业" in lower_title:
                  tag = "职业攻略"
              elif "副本" in lower_title or "团本" in lower_title:
                  tag = "副本攻略"
              elif "装备" in lower_title:
                  tag = "装备攻略"
              elif "新手" in lower_title or "开荒" in lower_title:
                  tag = "新手开荒"
              elif "氪金" in lower_title or "充值" in lower_title:
                  tag = "氪金指南"

              entry = f"  {{bvid:'{bvid}',tag:'{tag}',title:'{title}',author:'{author}',views:'{views}'}}"
              new_entries.append(entry)

          # 构建新的 videoLibrary 数组内容
          new_entries_str = ",\n".join(new_entries)

          # 在 index.html 中找到 videoLibrary 数组并插入新条目
          # 匹配 const videoLibrary=[ 后的第一个元素
          pattern = r"(const videoLibrary=\[\n)"
          replacement = r"\1" + new_entries_str + ",\n"

          new_html = re.sub(pattern, replacement, html, count=1)

          if new_html == html:
              print("未能成功插入新视频到 index.html")
              sys.exit(1)

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(new_html)

          print(f"已更新 index.html，新增 {len(new_videos)} 个视频")

          # 生成报告
          lines = ["## 🔍 发现新的B站攻略视频", ""]
          lines.append(f"巡检时间：{time.strftime('%Y-%m-%d %H:%M')}")
          lines.append(f"发现新视频数量：**{len(new_videos)}**")
          lines.append("")

          for idx, v in enumerate(new_videos, 1):
              bvid = v.get("bvid", "")
              title = v.get("title", "").replace("<em class=\"keyword\">", "").replace("</em>", "")
              author = v.get("author", "")
              pubdate = time.strftime("%Y-%m-%d", time.localtime(v.get("pubdate", 0)))
              url = f"https://www.bilibili.com/video/{bvid}"
              lines.append(f"### {idx}. {title}")
              lines.append(f"- **UP主**：{author}")
              lines.append(f"- **发布日期**：{pubdate}")
              lines.append(f"- **链接**：{url}")
              lines.append("")

          lines.append("---")
          lines.append("✅ 已自动更新到网站视频库")

          report = "\n".join(lines)
          with open("report.md", "w", encoding="utf-8") as f:
              f.write(report)

          with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
              f.write("has_new=true\n")
              f.write(f"count={len(new_videos)}\n")
          print(report)
          PYEOF

      - name: Commit and push changes
        if: steps.search.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "auto: 添加 $(cat report.md | grep '发现新视频数量' | sed 's/.*\*\*\([0-9]*\)\*\*.*/\1/') 个新B站攻略视频"
          git push origin main

      - name: Create GitHub Issue
        if: steps.search.outputs.has_new == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.md', 'utf-8');
            const count = '${{ steps.search.outputs.count }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎬 发现 ${count} 个新的B站天堂2盟约攻略视频（${new Date().toLocaleDateString('zh-CN')}）`,
              body: report,
              labels: ['bilibili', 'content-update', 'automated']
            });
            console.log(`已创建 Issue，发现 ${count} 个新视频`);
